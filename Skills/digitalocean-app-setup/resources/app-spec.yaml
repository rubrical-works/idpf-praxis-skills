# DigitalOcean App Platform Spec — Infrastructure as Code
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: my-app

services:
  - name: web
    github:
      repo: your-org/your-repo
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 10
      period_seconds: 30
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET

databases:
  - name: my-app-db
    engine: PG
    production: false
    cluster_name: my-app-db
    db_name: my_app
    db_user: my_app_user
