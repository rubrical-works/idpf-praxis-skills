# Render Blueprint — Infrastructure as Code
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: my-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: my-app-db
          property: connectionString

databases:
  - name: my-app-db
    plan: free
    region: oregon
