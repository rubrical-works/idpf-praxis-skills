name: Skill CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate skill structure
        run: |
          errors=0
          for dir in Skills/*/; do
            skill=$(basename "$dir")
            [ "$skill" = "Packaged" ] && continue
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "FAIL: $skill missing SKILL.md"
              errors=$((errors + 1))
            fi
            if [ ! -f "$dir/LICENSE.txt" ]; then
              echo "FAIL: $skill missing LICENSE.txt"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors error(s) found"
            exit 1
          fi
          echo "All skills have required files"

      - name: Validate checksums
        run: |
          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const checksums = JSON.parse(fs.readFileSync('checksums.json', 'utf8'));
          let errors = 0;
          for (const entry of checksums.files) {
            if (!fs.existsSync(entry.relativePath)) {
              console.log('MISSING:', entry.relativePath);
              errors++;
              continue;
            }
            const content = fs.readFileSync(entry.relativePath);
            const hash = crypto.createHash('sha256').update(content).digest('hex');
            if (hash !== entry.sha256) {
              console.log('MISMATCH:', entry.relativePath);
              errors++;
            }
          }
          if (errors > 0) { console.log(errors + ' error(s)'); process.exit(1); }
          console.log(checksums.files.length + ' files verified');
          "

      - name: Validate packaged zips exist
        run: |
          errors=0
          for dir in Skills/*/; do
            skill=$(basename "$dir")
            [ "$skill" = "Packaged" ] && continue
            if [ ! -f "Skills/Packaged/$skill.zip" ]; then
              echo "FAIL: missing Skills/Packaged/$skill.zip"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors missing package(s)"
            exit 1
          fi
          echo "All skill packages present"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
